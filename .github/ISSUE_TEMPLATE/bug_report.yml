name: Bug report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the fields below to help us reproduce.

        **For security issues, do NOT open a public issue.** See [SECURITY.md](https://github.com/autmzr/cmd/blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I X, the agent did Y instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably reproduce the issue.
      placeholder: |
        1. Open the app on iOS Safari
        2. Tap "+" on the Devices tab
        3. Run the connect command
        4. Observe agent staying offline
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Agent should appear online within 5 seconds.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Autmzr version
      description: Output of `git rev-parse HEAD` or release tag.
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true

  - type: input
    id: deployment
    attributes:
      label: Deployment
      placeholder: self-hosted (Docker compose) / cloud (autmzr.com)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Master OS / Node version
      placeholder: Ubuntu 24.04, Node 20.18.0
    validations:
      required: false

  - type: input
    id: agent-os
    attributes:
      label: Agent OS / Node version
      placeholder: macOS 14.5, Node 20.18.0
    validations:
      required: false

  - type: input
    id: cli
    attributes:
      label: CLI affected
      placeholder: claude / gemini / both / N/A
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output of `docker compose logs master agent` or similar. Redact secrets.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I'm running the latest commit on `main` (or specified my version above).
          required: true
