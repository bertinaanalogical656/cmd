name: CLI integration request
description: Request support for a new AI coding CLI
labels: ["cli-integration", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Want Autmzr to support a new CLI? This is a high-priority category for us — fill out the fields below so we can scope the work.

  - type: input
    id: cli-name
    attributes:
      label: CLI name
      placeholder: aider / cursor-cli / opencode / ...
    validations:
      required: true

  - type: input
    id: cli-url
    attributes:
      label: Project URL
      placeholder: https://github.com/...
    validations:
      required: true

  - type: dropdown
    id: license
    attributes:
      label: CLI license
      options:
        - MIT / Apache / BSD (permissive)
        - GPL / AGPL (copyleft)
        - Proprietary / closed-source
        - Unknown
    validations:
      required: true

  - type: textarea
    id: install
    attributes:
      label: How is it installed?
      placeholder: npm i -g X / pip install X / curl ... | bash / Homebrew / ...
    validations:
      required: true

  - type: textarea
    id: invocation
    attributes:
      label: How is it invoked?
      description: Command name, key flags (--print, --json, --stream, --model, etc.), env vars used.
      placeholder: |
        Command: `aider`
        Key flags: --message, --no-stream, --json
        Env: OPENAI_API_KEY
    validations:
      required: true

  - type: textarea
    id: streaming
    attributes:
      label: Does it support streaming output?
      placeholder: Yes / No / Partial — describe.
    validations:
      required: true

  - type: textarea
    id: auth
    attributes:
      label: Auth mechanism
      placeholder: API key in env var / OAuth via login command / config file / ...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Personal urgency
      options:
        - I'd switch to Autmzr if this shipped
        - I'd use this in addition to existing CLIs
        - Nice-to-have
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to author the integration PR.
          required: false
        - label: I can help test once a draft is ready.
          required: false
