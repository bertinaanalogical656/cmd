services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pc
      POSTGRES_PASSWORD: pcpwd
      POSTGRES_DB: autmzr_command
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  master:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on: [postgres]
    ports:
      - "${PORT:-3100}:3100"
    environment:
      DATABASE_URL: postgresql://pc:pcpwd@postgres:5432/autmzr_command
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3100/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
